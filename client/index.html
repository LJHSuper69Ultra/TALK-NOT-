<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KakaoTalk</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Login/Register Screen -->
    <div id="auth-screen" class="screen">
        <div class="auth-container">
            <div class="logo">
                <div class="logo-icon">💬</div>
                <h1>카카오톡</h1>
            </div>
            <div class="auth-tabs">
                <button class="tab active" data-tab="login">로그인</button>
                <button class="tab" data-tab="register">회원가입</button>
            </div>
            
            <!-- Login Form -->
            <div id="login-form" class="auth-form active">
                <input type="text" id="login-username" placeholder="아이디" autocomplete="off">
                <input type="password" id="login-password" placeholder="비밀번호">
                <button id="login-btn" class="btn-primary">로그인</button>
            </div>
            
            <!-- Register Form -->
            <div id="register-form" class="auth-form">
                <input type="text" id="register-username" placeholder="아이디" autocomplete="off">
                <input type="password" id="register-password" placeholder="비밀번호">
                <input type="password" id="register-confirm" placeholder="비밀번호 확인">
                <button id="register-btn" class="btn-primary">회원가입</button>
            </div>
        </div>
    </div>

    <!-- Main Chat Screen -->
    <div id="chat-screen" class="screen hidden">
        <!-- Left Panel: Friends + Rooms -->
        <div class="friend-list-panel">
            <div class="panel-header">
                <div class="chat-type-tabs">
                    <button class="chat-type-tab active" data-type="friends">친구</button>
                    <button class="chat-type-tab" data-type="rooms">그룹채팅</button>
                </div>
                <button id="create-room-btn" class="btn-create-room">+</button>
            </div>
            
            <!-- Friends List -->
            <div id="friend-list" class="friend-list">
                <!-- Friends will be populated here -->
            </div>
            
            <!-- Rooms List -->
            <div id="room-list" class="room-list hidden">
                <!-- Rooms will be populated here -->
            </div>
        </div>

        <!-- Chat Area (Right) -->
        <div class="chat-panel">
            <div class="chat-header">
                <span id="chat-with">채팅방을 선택하세요</span>
            </div>
            <div id="messages" class="messages">
                <div class="empty-state">
                    <p>대화상대를 선택해주세요</p>
                </div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="message-input" placeholder="메시지를 입력하세요..." disabled>
                <button id="send-btn" class="btn-send" disabled>전송</button>
            </div>
        </div>
    </div>

    <script src="renderer.js"></script>

    <!-- Room Creation Modal -->
    <div id="room-modal" class="modal hidden">
        <div class="modal-content">
            <h3>그룹 채팅방 만들기</h3>
            <input type="text" id="room-name" placeholder="방 이름">
            <input type="password" id="room-password" placeholder="비밀번호 (선택)">
            <div class="modal-buttons">
                <button id="create-room-confirm" class="btn-primary">만들기</button>
                <button id="create-room-cancel" class="btn-secondary">취소</button>
            </div>
        </div>
    </div>

    <!-- Room Join Modal -->
    <div id="join-room-modal" class="modal hidden">
        <div class="modal-content">
            <h3>비밀번호 입력</h3>
            <p id="join-room-name"></p>
            <input type="password" id="join-room-password" placeholder="비밀번호">
            <div class="modal-buttons">
                <button id="join-room-confirm" class="btn-primary">입장</button>
                <button id="join-room-cancel" class="btn-secondary">취소</button>
            </div>
        </div>
    </div>
</body>
</html>
